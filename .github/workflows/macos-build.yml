name: macOS Build (PyInstaller)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    # Note: GitHub-hosted Intel mac runners (macos-13) are not available on many accounts.
    # We target macOS 14 (Apple Silicon) which is the default GitHub macOS runner.
    name: Build on macOS 14 (arm64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Use bash to avoid executable bit/line-ending issues
          bash ./build_macos.sh

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: FlameBot-macOS-arm64
          path: dist/FlameBot-macOS.zip
          if-no-files-found: error

      - name: Upload artifact (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: FlameBot-macOS-arm64-dmg
          path: dist/FlameBot-macOS.dmg
          if-no-files-found: error

      - name: Attach to GitHub Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FlameBot-macOS.zip
            dist/FlameBot-macOS.dmg
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}