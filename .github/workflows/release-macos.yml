name: Build macOS Release Asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (example: v1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      FLAMEBOT_TG_API_ID: ${{ secrets.FLAMEBOT_TG_API_ID }}
      FLAMEBOT_TG_API_HASH: ${{ secrets.FLAMEBOT_TG_API_HASH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Ensure managed Telegram API secrets present
        shell: bash
        run: |
          if [[ -z "${FLAMEBOT_TG_API_ID}" || -z "${FLAMEBOT_TG_API_HASH}" ]]; then
            echo "Missing secrets. Set FLAMEBOT_TG_API_ID and FLAMEBOT_TG_API_HASH in GitHub repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Write app/telegram_app.json
        shell: bash
        run: |
          mkdir -p app
          cat > app/telegram_app.json <<EOF
          {
            "api_id": ${FLAMEBOT_TG_API_ID},
            "api_hash": "${FLAMEBOT_TG_API_HASH}"
          }
          EOF

      - name: Build macOS bundle
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh

      - name: Upload macOS zip to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FlameBot-macOS.zip

      - name: Upload macOS zip to Release (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist/FlameBot-macOS.zip