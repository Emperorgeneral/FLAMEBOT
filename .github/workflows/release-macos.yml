name: Build macOS Release Asset

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Build macOS bundle
        run: |
          chmod +x ./build_macos.sh
          ./build_macos.sh

      - name: Upload macOS zip to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FlameBot-macOS.zip

      - name: Upload macOS zip (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: FlameBot-macOS.zip
          path: dist/FlameBot-macOS.zip
