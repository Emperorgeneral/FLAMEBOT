name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build (PyInstaller)
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --clean --name FlameBot --windowed \
            --add-data "eas:eas" \
            app/flamebot_entry.py

      - name: Stage zip folder
        run: |
          mkdir -p dist/FlameBot-macOS
          cp -R dist/FlameBot.app dist/FlameBot-macOS/FlameBot.app
          cp -R eas dist/FlameBot-macOS/eas
          cp -f README-Install-mac.txt dist/FlameBot-macOS/README-Install-mac.txt

      - name: Create zip
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent FlameBot-macOS FlameBot-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlameBot-macOS
          path: dist/FlameBot-macOS.zip
          if-no-files-found: error
